<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#101213" />
    <title>Synthetic Data Studio</title>
    <meta
      name="description"
      content="Browser-based 3D tool for generating synthetic training data via hand-tracked gestures or a virtual camera, with direct Edge Impulse upload."
    />

    <!-- Open Graph / Facebook / LinkedIn / Slack / Discord / iMessage.
         LinkedIn's scraper requires absolute URLs for og:image — relative
         paths render as a title-only card. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://synthetic.jennyspeelman.dev/" />
    <meta property="og:title" content="Synthetic Data Studio" />
    <meta
      property="og:description"
      content="Browser-based 3D tool for generating synthetic training data via hand-tracked gestures or a virtual camera, with direct Edge Impulse upload."
    />
    <meta property="og:image" content="https://synthetic.jennyspeelman.dev/og-card.png" />
    <meta property="og:image:secure_url" content="https://synthetic.jennyspeelman.dev/og-card.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Synthetic Data Studio — isometric teal cube on a dark background" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Synthetic Data Studio" />
    <meta
      name="twitter:description"
      content="Browser-based 3D tool for generating synthetic training data via hand-tracked gestures or a virtual camera, with direct Edge Impulse upload."
    />
    <meta name="twitter:image" content="https://synthetic.jennyspeelman.dev/og-card.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // ?clearStore=1 wipes persisted state before any module loads
      // and rehydrates. Useful for support links and dev resets.
      // Runs synchronously here so zustand's persist middleware never
      // sees the old state on this load. See docs/url-parameters.md.
      //
      // Two guardrails:
      //  - A confirm() dialog stops a one-click phishing link from
      //    silently destroying the user's imported assets / textures.
      //  - We only delete this app's IndexedDB databases by name
      //    instead of iterating indexedDB.databases() (which would
      //    nuke unrelated DBs the browser created on the same origin
      //    if anything else ever shares it).
      (function () {
        try {
          var p = new URLSearchParams(window.location.search);
          var c = p.get('clearStore');
          if (c === '1' || c === 'true' || c === 'yes') {
            var ok = false;
            try {
              ok = window.confirm(
                'Reset Synthetic Data Studio?\n\n' +
                  'This will erase saved settings, imported assets, and custom textures from this browser. ' +
                  'Continue?'
              );
            } catch (e) {
              ok = false;
            }
            if (ok) {
              try { localStorage.removeItem('sds-store'); } catch (e) {}
              try { localStorage.removeItem('sds-theme'); } catch (e) {}
              var DB_NAMES = ['sds-assets', 'sds-textures'];
              for (var i = 0; i < DB_NAMES.length; i++) {
                try { indexedDB.deleteDatabase(DB_NAMES[i]); } catch (e) {}
              }
            }
          }
        } catch (e) {}
      })();
      // Apply the persisted theme before the first paint to avoid a
      // dark→light flash on light-mode reloads. `?theme=` overrides
      // both the persisted value and the default.
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var override = (params.get('theme') || '').toLowerCase();
          var t =
            override === 'dark' || override === 'light'
              ? override
              : localStorage.getItem('sds-theme');
          document.documentElement.dataset.theme =
            t === 'light' ? 'light' : 'dark';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
